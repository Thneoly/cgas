events {
    worker_connections 2048;
}

http {
    upstream cgas_staging_backend {
        least_conn;
        server staging-app-1:8080 weight=1 max_fails=3 fail_timeout=30s;
        server staging-app-2:8080 weight=1 max_fails=3 fail_timeout=30s;
        server staging-app-3:8080 weight=1 max_fails=3 fail_timeout=30s;
        server staging-app-4:8080 weight=1 max_fails=3 fail_timeout=30s;
        server staging-app-5:8080 weight=1 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://cgas_staging_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /health {
            proxy_pass http://cgas_staging_backend/health;
            access_log off;
        }
    }
}
