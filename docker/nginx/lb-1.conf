events {
    worker_connections 1024;
}

http {
    upstream cgas_beta_backend {
        least_conn;
        server beta-app-1:8080 weight=1 max_fails=3 fail_timeout=30s;
        server beta-app-2:8080 weight=1 max_fails=3 fail_timeout=30s;
        server beta-app-3:8080 weight=1 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://cgas_beta_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /health {
            proxy_pass http://cgas_beta_backend/health;
            access_log off;
        }
    }
}
