version: '3.8'

# CGAS Alpha Environment - Local Docker Setup
# For internal testing and validation

services:
  # ==================== Database Services ====================
  postgres:
    image: postgres:15-alpine
    container_name: cgas-alpha-postgres
    environment:
      POSTGRES_DB: cgas
      POSTGRES_USER: cgas
      POSTGRES_PASSWORD: AlphaEnv2026!Secure
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - cgas_alpha_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - cgas_alpha_network
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cgas -d cgas"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cgas-alpha-redis
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - cgas_alpha_redis:/data
    networks:
      - cgas_alpha_network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==================== Application Services ====================
  executor:
    build:
      context: ..
      dockerfile: docker/Executor.Dockerfile
    container_name: cgas-alpha-executor
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
      - DATABASE_URL=postgresql://cgas:AlphaEnv2026!Secure@postgres:5432/cgas
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=alpha
      - SERVICE_NAME=executor
      - CONFIG_PATH=/app/config/executor.yaml
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cgas_alpha_network
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '2.0'
          memory: 2G
    volumes:
      - cgas_alpha_logs:/app/logs
      - ./config:/app/config:ro
      - ./data:/app/data
    # No healthcheck for mock executor - uses idle loop
    restart: unless-stopped

  verifier:
    build:
      context: ..
      dockerfile: docker/Executor.Dockerfile
    container_name: cgas-alpha-verifier
    ports:
      - "8081:8080"
    environment:
      - RUST_LOG=info
      - DATABASE_URL=postgresql://cgas:AlphaEnv2026!Secure@postgres:5432/cgas
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=alpha
      - SERVICE_NAME=verifier
      - CONFIG_PATH=/app/config/verifier.yaml
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      executor:
        condition: service_started
    networks:
      - cgas_alpha_network
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '2.0'
          memory: 2G
    volumes:
      - cgas_alpha_logs:/app/logs
      - ./config:/app/config:ro
      - ./data:/app/data
    # No healthcheck for mock executor - uses idle loop
    restart: unless-stopped

  # ==================== Monitoring Services ====================
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: cgas-alpha-prometheus
    ports:
      - "9091:9090"  # Changed to avoid port conflict
    volumes:
      - ./monitoring/prometheus.alpha.yml:/etc/prometheus/prometheus.yml
      - cgas_alpha_prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    networks:
      - cgas_alpha_network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.0.0
    container_name: cgas-alpha-grafana
    ports:
      - "3001:3000"  # Changed to avoid port conflict
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=AlphaGrafana2026
    volumes:
      - cgas_alpha_grafana:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - cgas_alpha_network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.6.0
    container_name: cgas-alpha-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - cgas_alpha_network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    restart: unless-stopped

# ==================== Networks and Volumes ====================
networks:
  cgas_alpha_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  cgas_alpha_data:
    driver: local
  cgas_alpha_redis:
    driver: local
  cgas_alpha_logs:
    driver: local
  cgas_alpha_prometheus:
    driver: local
  cgas_alpha_grafana:
    driver: local
