# Phase 0 工作流配置 - 基线冻结阶段

release_prefix: release-2026-03-05
deliverables_root: ../doc/phase0
runtime_artifacts_root: ../doc/phase0/runtime_artifacts
prompt_pack_fallback_path: ../doc/agent_prompts/phase0_execution_prompt_pack.md
gate_rules_path: ../doc/phase0/phase0_gate_rules_v1.md

board_headings:
  - "## 本周目标"
  - "## 任务表"
  - "## 角色启动指令"
  - "## 周末验收清单"

gate_headings:
  - "## 核心规则"
  - "## 判定口径"
  - "## 例外策略"
  - "## 审计要求"

stages:
  # Phase 0 Week 1: 契约框架与冻结
  - id: phase0_week01
    context_label: Phase0 Week1 - 契约框架定稿
    week_hint: 1
    board_path: ../doc/phase0/phase0_week1_execution_board.md
    gates: [phase0_contract_defined, phase0_stakeholders_approved]
    initial_roles: [PM]
    deliverable_paths:
      PM: phase0_week1_contract_draft_v1.md
      Dev: phase0_week1_contract_technical_spec.md
      QA: phase0_week1_replay_set_spec.md
      Security: phase0_week1_security_baseline.md
      SRE: phase0_week1_observability_baseline.md

  # Phase 0 Week 2: 契约冻结与校验器
  - id: phase0_week02
    context_label: Phase0 Week2 - 契约冻结
    week_hint: 2
    board_path: ../doc/phase0/phase0_week2_execution_board.md
    gates: [phase0_contract_frozen, phase0_validator_ready]
    initial_roles: [PM]
    deliverable_paths:
      PM: phase0_week2_contract_frozen_v1.md
      Dev: phase0_week2_contract_validator.md
      QA: phase0_week2_validation_matrix.md
      Security: phase0_week2_threat_model.md
      SRE: phase0_week2_deployment_baseline.md

  # Phase 0 Week 3: 回放集构建
  - id: phase0_week03
    context_label: Phase0 Week3 - 回放集构建
    week_hint: 3
    board_path: ../doc/phase0/phase0_week3_execution_board.md
    gates: [phase0_replay_set_ready, phase0_sample_minimum]
    initial_roles: [QA]
    deliverable_paths:
      PM: phase0_week3_scope_summary.md
      Dev: phase0_week3_replay_runner.md
      QA: phase0_week3_replay_set_n200.md
      Security: phase0_week3_adversarial_samples.md
      SRE: phase0_week3_ci_integration.md

  # Phase 0 Week 4: 门禁链路打通
  - id: phase0_week04
    context_label: Phase0 Week4 - 门禁链路打通
    week_hint: 4
    board_path: ../doc/phase0/phase0_week4_execution_board.md
    gates: [phase0_gate_report_ready, phase0_ci_integration]
    initial_roles: [Dev]
    deliverable_paths:
      PM: phase0_week4_phase0_closeout.md
      Dev: phase0_week4_gate_report_generator.md
      QA: phase0_week4_gate_validation.md
      Security: phase0_week4_security_signoff.md
      SRE: phase0_week4_production_readiness.md
